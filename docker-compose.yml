services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: expendly
      POSTGRES_PASSWORD: expendly
      POSTGRES_DB: expendly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expendly -d expendly"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
